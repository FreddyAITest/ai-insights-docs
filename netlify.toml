[build]
  publish = "."
  command = "echo 'No build step required - static site'"

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Handle SPA routing for landing-page
[[redirects]]
  from = "/app/*"
  to = "/landing-page/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
